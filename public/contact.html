<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Cooking Envy</title>
  <meta name="description" content="Contact Cooking Envy for recipe questions, partnerships, or feedback." />
  <link rel="canonical" href="https://example.com/contact.html" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="topbar">Fresh recipes, simple steps, and delicious inspiration every day.</div>
  <main class="page">
    <h1>Contact Us</h1>
    <p>Email: support@cookingenvy.com</p>
    <p>For questions, suggestions, or partnerships, send us a message below.</p>
    <form action="#" method="post">
      <input type="text" name="name" placeholder="Your Name" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #d1d5db;border-radius:8px">
      <input type="email" name="email" placeholder="Your Email" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #d1d5db;border-radius:8px">
      <textarea name="message" rows="6" placeholder="Your Message" required style="width:100%;padding:12px;margin:8px 0;border:1px solid #d1d5db;border-radius:8px"></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
    <p><a class="btn" href="/">Back to Home</a></p>
  </main>
</body>
</html>
